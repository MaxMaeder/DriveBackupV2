name: DriveBackupV2 Authenticator

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - 'dependabot/**'
    paths:
      - 'Authenticator/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Authenticator

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Authorize Docker push
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - id: build
      name: Build and Push Container
      run: |-
        docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/authenticator/authenticator:${{ github.sha }} .
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/authenticator/authenticator:${{ github.sha }}

    - name: Deploy to Cloud Run
      id: deploy
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: authenticator
        image: ${{ steps.build.outputs.image }}
        region: us-central1
